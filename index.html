<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Михаил Нагорный</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f4f4f4;
            --card-bg: #ffffff;
            --text-primary: #111111;
            --text-secondary: #666666;
            --accent: #1a1a1a;
            --border: #e5e5e5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .flashcard {
            background: var(--card-bg);
            width: 100%;
            max-width: 720px;
            padding: 48px;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
        }

        .artist-name {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .tagline {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .video-container {
            margin-bottom: 32px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        iframe, video {
            width: 100%;
            height: 360px;
            display: block;
        }

        .event-section {
            border-top: 1px solid var(--border);
            padding-top: 24px;
        }

        .event-title {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .event-detail {
            margin-bottom: 8px;
            font-size: 15px;
        }

        .label {
            color: var(--text-secondary);
            font-weight: 400;
        }

        footer {
            margin-top: 40px;
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
        }

        @media (max-width: 600px) {
            .flashcard {
                padding: 32px 24px;
            }

            iframe, video {
                height: 220px;
            }
        }
    </style>
</head>
<body>

<div class="flashcard">
    <div class="artist-name">Контакт: +79104831204.</div>
    <div class="tagline">Живое выступление • Оригинальная музыка • Автор-исполнитель - Михаил Нагорный. Семь песен на иностранных языках, два концерта за границей.</div>

    <!-- VIDEO SECTION -->
    <div class="video-container">
        <!-- Option 1: YouTube Embed -->
        <video controls preload="none" playsinline>
            <source src="1.mp4-lq.mp4" type="video/mp4">

        <video controls preload="none" playsinline>

        </video>


        <video controls preload="none" playsinline>
            <source src="6.mp4-lq.mp4" type="video/mp4">
        </video>


        <video controls preload="none" playsinline>
            <source src="7.mp4-lq.mp4" type="video/mp4">
        </video>

        <video controls preload="none" playsinline>

        <video controls preload="none" playsinline>

        </video>
        -->
    </div>

    <!-- EVENT SECTION -->

    <footer>
        © 2026 Михаил Нагорный
    </footer>
</div>

</body>
</html>
